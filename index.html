<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <!--
    CSP UPDATED:
    - Adds img-src so preview images can load (was blocked by default-src 'self')
    - Adds connect-src for metadata JSON fetching from IPFS gateways + Arweave/ArDrive
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline';
    style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
    font-src 'self' https://fonts.gstatic.com;

    connect-src 'self'
      https://rpc.testnet.soniclabs.com
      https://ipfs.io
      https://cloudflare-ipfs.com
      https://gateway.pinata.cloud
      https://arweave.net
      https://ar-io.net
      https://ardrive.io
      https://*.ardrive.io;

    img-src 'self' data: blob:
      https://ipfs.io
      https://cloudflare-ipfs.com
      https://gateway.pinata.cloud
      https://arweave.net
      https://ar-io.net
      https://ardrive.io
      https://*.ardrive.io;
  "/>

  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>NFT Orderbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --neon: #00ffe1;
      --neon-dim: rgba(0,255,225,0.2);
      --text-light: #e0e0e0;
      --card-bg: rgba(255,255,255,0.05);
      --radius: 16px;
      --gap: 1.5rem;
      --transition: 0.3s ease;
      --banner-h: 48px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at center,#1a1a3d,#0a0a1f);
      color: var(--text-light);
      font-family: 'Roboto', sans-serif;
      padding: calc(var(--gap) + var(--banner-h)) var(--gap) var(--gap);
      line-height: 1.4;
    }
    .top-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--banner-h);
      background: linear-gradient(90deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25));
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      overflow: hidden;
      z-index: 1000;
      padding: 0 1rem;
      backdrop-filter: blur(6px);
    }
    .ticker {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
      transform: translateX(100%);
      animation: scroll-left 36s linear infinite;
      animation-play-state: paused;
      font-weight: 500;
      color: var(--text-light);
      font-size: 0.95rem;
    }
    .ticker.running { animation-play-state: running; }
    @keyframes scroll-left {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .stat-pill {
      display: inline-block;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.04);
      padding: 6px 12px;
      margin-right: 12px;
      border-radius: 999px;
      color: var(--neon);
      box-shadow: 0 0 4px rgba(0,255,225,0.04);
    }
    .brand {
      text-align: center;
      font-size: 2.3rem;
      font-weight: 700;
      color: var(--neon);
      margin-bottom: var(--gap);
      letter-spacing: 2px;
    }
    #wallet-button {
      position: fixed;
      top: calc(var(--banner-h) + 8px);
      right: var(--gap);
      padding: .6rem 1.2rem;
      border: 2px solid var(--neon);
      background: transparent;
      color: var(--neon);
      border-radius: var(--radius);
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      z-index: 1101;
    }
    #wallet-button:hover { background: var(--neon-dim); color: #fff; }
    .lower-section {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(320px,1fr));
      gap: var(--gap);
    }
    .box {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: var(--gap);
      display: flex;
      flex-direction: column;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .box:hover {
      transform: translateY(-6px);
      box-shadow: 0 4px 32px rgba(0,0,0,0.6);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--neon);
      text-align: center;
      margin-bottom: 1rem;
    }
    label {
      font-weight: 500;
      margin-bottom: .35rem;
      color: var(--text-light);
      display: block;
    }
    input, select {
      width: 100%;
      padding: .55rem .6rem;
      margin-bottom: .75rem;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: var(--text-light);
      font-size: 0.95rem;
      transition: border var(--transition);
    }
    input:focus, select:focus { outline: none; border-color: var(--neon); }
    button.action {
      padding: .6rem .9rem;
      border: 2px solid var(--neon);
      background: transparent;
      color: var(--neon);
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      margin-top: .25rem;
      width: 100%;
    }
    button.action:hover { background: var(--neon-dim); color: #fff; }
    .info {
      text-align: center;
      margin: .5rem 0;
      font-size: .9rem;
    }
    .small {
      font-size: 0.8rem;
      opacity: 0.8;
    }
    @media (max-width: 600px) {
      .ticker { animation-duration: 52s; font-size: 0.85rem; }
      body { padding-top: calc(var(--banner-h) + 12px); }
    }
  </style>
</head>

<body>
  <!-- Shared datalist for BOTH NFT Collection inputs -->
  <datalist id="recorded-collections"></datalist>

  <div class="top-banner">
    <div class="ticker" id="rolling-stats">
      <span class="stat-pill">Network: Sonic Testnet</span>
      <span class="stat-pill">RPC: <span id="rpc-status">Checking…</span></span>
      <span class="stat-pill">Wallet: <span id="wallet-status">Disconnected</span></span>
      <span class="stat-pill">My offers: <span id="user-offer-stats">–</span></span>
    </div>
  </div>

  <div class="brand">NFT Orderbook</div>
  <button id="wallet-button">Connect</button>

  <div class="lower-section">
    <div class="box">
      <h1>Create Offer</h1>

      <label for="offer-collection">NFT Collection</label>
      <input id="offer-collection"
             placeholder="0x... (NFT collection)"
             list="recorded-collections"/>

      <label for="offer-amount">Offer Amount (S)</label>
      <input id="offer-amount" type="number" min="0" step="0.0001" placeholder="Amount in S"/>

      <label for="offer-expiry">Expiry (hours, 0 = no expiry)</label>
      <input id="offer-expiry" type="number" min="0" step="1" placeholder="e.g. 24 for 1 day"/>

      <div class="info small" id="offer-fee-preview">Fee: – Total to send: –</div>
      <div class="info small" id="offer-collection-name">Collection name: –</div>

      <button class="action" id="btn-preview-fee">Preview Fee</button>
      <button class="action" id="btn-create-offer">Create Offer</button>
      <div class="info" id="offer-status"></div>
    </div>

    <div class="box">
      <h1>Offers by Collection</h1>

      <label for="browse-collection">NFT Collection</label>
      <input id="browse-collection"
             placeholder="(blank = all active) or 0x..."
             list="recorded-collections"/>

      <div class="info" style="margin-top:1rem;">
        <img id="nft-preview" style="max-width:100%; border-radius:12px; display:none;" />
      </div>

      <label for="collection-offers" class="small" style="margin-top:.5rem;">Active Offers</label>
      <select id="collection-offers" size="8"></select>

      <label for="fulfil-token-id" class="small" style="margin-top:.5rem;">Token ID to sell into selected offer</label>
      <input id="fulfil-token-id" type="number" min="0" placeholder="Your NFT tokenId"/>

      <button class="action" id="btn-fulfil-offer">Fulfil Offer</button>
      <div class="info small" id="collection-offers-status"></div>
    </div>

    <div class="box">
      <h1>My Offers</h1>

      <label for="my-offers" class="small" style="margin-top:.5rem;">My Active Offers</label>
      <select id="my-offers" size="8"></select>

      <button class="action" id="btn-cancel-offer">Cancel Selected Offer</button>

      <label for="withdraw-offer-id" class="small" style="margin-top:.75rem;">Fulfilled Offers (NFT Ready)</label>
      <select id="withdraw-offer-id" size="5"></select>

      <button class="action" id="btn-withdraw-nft">Withdraw NFT</button>
      <div class="info small" id="my-offers-status"></div>
    </div>
  </div>

  <div style="text-align:center; margin-top:2rem; opacity:0.8;">
    <a href="https://testnet-6qu.pages.dev/" target="_blank" style="color:var(--neon); text-decoration:none;">
      InFlow
    </a>
  </div>

  <script type="module">
    import { ethers } from 'https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.esm.min.js';

    // UPDATED to your deployed contract address
    const ESCROW_ADDRESS = "0x91B2b53B51A09bBf0C256D19Db78feE101F1c9B6";

    // Sonic testnet settings match Sonic docs. [1](https://www.datawallet.com/crypto/get-sonic-faucet-testnet-tokens)
    const REQUIRED_CHAIN_ID = 14601;
    const SONIC_CHAIN_ID_HEX = '0x3909';
    const SONIC_RPC = 'https://rpc.testnet.soniclabs.com';

    const ESCROW_ABI = [
      "function minFee() view returns (uint256)",
      "function feeBps() view returns (uint256)",
      "function calculateFee(uint256 amount) view returns (uint256)",

      "function createOffer(address nftContract,uint256 amount,uint64 expirySeconds) payable",
      "function createOffer(address nftContract,uint256 amount,uint64 expirySeconds,string collectionName) payable",

      "function cancelOffer(uint256 offerId)",
      "function fulfilOffer(uint256 offerId,uint256 tokenId)",
      "function withdrawNFT(uint256 offerId)",

      "function getActiveOffersByCollection(address nftContract) view returns (uint256[])",
      "function getActiveOffers(address nftContractOrZero) view returns (uint256[])",

      "function getActiveOffersByBuyer(address buyer) view returns (uint256[])",
      "function getOffersByBuyer(address buyer) view returns (uint256[])",
      "function getOffer(uint256 offerId) view returns (tuple(address buyer,address seller,uint256 amount,address nftContract,uint256 tokenId,uint256 fee,uint256 totalPaid,uint8 status,uint64 createdAt,uint64 fulfilledAt,uint64 cancelledAt,uint64 withdrawnAt,uint64 expiry))",
      "function getUserStats(address buyer) view returns (uint256 totalOffers,uint256 activeOffers,uint256 fulfilledOffers,uint256 cancelledOffers)",

      "function getCollectionCount() view returns (uint256)",
      "function getCollectionsRange(uint256 start,uint256 count) view returns (tuple(address nftContract,string name)[])"
    ];

    const ERC721_ABI = [
      "function ownerOf(uint256) view returns (address)",
      "function getApproved(uint256) view returns (address)",
      "function isApprovedForAll(address,address) view returns (bool)",
      "function approve(address,uint256)",
      "function setApprovalForAll(address,bool)",
      "function tokenURI(uint256) view returns (string)",
      "function name() view returns (string)"
    ];

    const SONIC_PARAMS = [{
      chainId: SONIC_CHAIN_ID_HEX,
      chainName: 'Sonic Testnet',
      nativeCurrency: { name: 'S', symbol: 'S', decimals: 18 },
      rpcUrls: [SONIC_RPC],
      blockExplorerUrls: ['https://testnet.sonicscan.org']
    }];

    let provider, signer, account;
    let escrowRead, escrowWrite;

    // Feature detection
    let hasCollectionRegistry = false;
    let hasCreateOfferWithName = false;

    const el = id => document.getElementById(id);

    /* ===== Cache: collection address -> name ===== */
    const collectionNameCache = new Map();

    async function getCollectionName(addr) {
      if (!ethers.utils.isAddress(addr)) return null;
      const key = addr.toLowerCase();
      if (collectionNameCache.has(key)) return collectionNameCache.get(key);

      try {
        const rpcProvider = provider || new ethers.providers.JsonRpcProvider(SONIC_RPC);
        const nft = new ethers.Contract(addr, ERC721_ABI, rpcProvider);
        const name = await nft.name();
        const safeName = (name && String(name).trim()) ? String(name).trim() : "(unavailable)";
        collectionNameCache.set(key, safeName);
        return safeName;
      } catch {
        const fallback = "(unavailable)";
        collectionNameCache.set(key, fallback);
        return fallback;
      }
    }

    /* ============================================================
       Dropdown list from on-chain recorded collections (if supported)
       ============================================================ */
    let recordedCollections = []; // [{ addr, name }]
    const recordedDatalistId = "recorded-collections";

    async function loadRecordedCollections() {
      if (!escrowRead || !hasCollectionRegistry) return;

      const dl = el(recordedDatalistId);
      if (!dl) return;

      dl.innerHTML = "";
      recordedCollections = [];

      try {
        const total = await escrowRead.getCollectionCount();
        const n = total.toNumber ? total.toNumber() : Number(total);

        const PAGE = 100;
        for (let start = 0; start < n; start += PAGE) {
          const page = await escrowRead.getCollectionsRange(start, Math.min(PAGE, n - start));
          for (const item of page) {
            const addr = item.nftContract;
            const name = (item.name && String(item.name).trim()) ? String(item.name).trim() : "(unavailable)";
            if (ethers.utils.isAddress(addr)) recordedCollections.push({ addr, name });
          }
        }

        for (const c of recordedCollections) {
          const opt = document.createElement("option");
          opt.value = c.addr;   // selection fills address
          opt.label = c.name;   // shows name (browser support varies)
          dl.appendChild(opt);
        }
      } catch (e) {
        console.warn("loadRecordedCollections failed:", e);
      }
    }

    /* ===== Parsing helper ===== */
    function extractAddress(text) {
      if (!text) return "";
      const m = String(text).match(/0x[a-fA-F0-9]{40}/);
      return m ? m[0] : "";
    }

    function normalizeCollectionInput(inputEl) {
      const raw = (inputEl.value || "").trim();
      if (ethers.utils.isAddress(raw)) return raw;

      const extracted = extractAddress(raw);
      if (ethers.utils.isAddress(extracted)) {
        inputEl.value = extracted;
        return extracted;
      }
      return raw;
    }

    /* ===== Create Offer: Debounced collection-name loader ===== */
    let offerNameTimer = null;

    async function loadOfferCollectionName() {
      const out = el('offer-collection-name');
      if (!out) return;

      const addr = normalizeCollectionInput(el('offer-collection'));
      if (!ethers.utils.isAddress(addr)) {
        out.textContent = 'Collection name: –';
        return;
      }
      out.textContent = 'Collection name: Loading…';
      const name = await getCollectionName(addr);
      out.textContent = `Collection name: ${name ?? '(unavailable)'}`;
    }

    function scheduleOfferCollectionNameLoad() {
      clearTimeout(offerNameTimer);
      offerNameTimer = setTimeout(loadOfferCollectionName, 250);
    }

    /* ============================================================
       Image preview (more reliable): IPFS + Arweave/ArDrive support
       ============================================================ */

    const IPFS_GATEWAYS = [
      "https://ipfs.io/ipfs/",
      "https://cloudflare-ipfs.com/ipfs/",
      "https://gateway.pinata.cloud/ipfs/"
    ];

    function isLikelyIpfs(uri) {
      return typeof uri === "string" && uri.startsWith("ipfs://");
    }

    function isLikelyAr(uri) {
      return typeof uri === "string" && uri.startsWith("ar://");
    }

    function normalizeArUri(uri) {
      // ar://<txid> -> https://arweave.net/<txid>
      return "https://arweave.net/" + uri.replace("ar://", "");
    }

    function ipfsToGateways(uri) {
      const path = uri.replace("ipfs://", "").replace(/^ipfs\//, "");
      return IPFS_GATEWAYS.map(g => g + path);
    }

    function normalizeResourceCandidates(uri) {
      if (!uri || typeof uri !== "string") return [];
      const u = uri.trim();

      // data: URIs are usable directly
      if (u.startsWith("data:")) return [u];

      if (isLikelyIpfs(u)) return ipfsToGateways(u);
      if (isLikelyAr(u)) return [normalizeArUri(u)];

      // Some metadata uses ipfs.io/ipfs/... already
      // Some use arweave.net / ar-io.net / ardrive.io directly
      return [u];
    }

    async function fetchWithTimeout(url, ms = 8000) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), ms);
      try {
        const res = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
        return res;
      } finally {
        clearTimeout(t);
      }
    }

    async function fetchFirstWorkingJson(uri) {
      const candidates = normalizeResourceCandidates(uri);
      let lastErr = null;

      for (const url of candidates) {
        try {
          // Handle data:application/json;base64,... quickly
          if (url.startsWith("data:")) {
            const comma = url.indexOf(",");
            if (comma === -1) continue;
            const metaPart = url.slice(0, comma);
            const dataPart = url.slice(comma + 1);
            if (metaPart.includes(";base64")) {
              const jsonText = atob(dataPart);
              return JSON.parse(jsonText);
            } else {
              // URL-encoded or plain
              return JSON.parse(decodeURIComponent(dataPart));
            }
          }

          const res = await fetchWithTimeout(url, 9000);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const text = await res.text();
          return JSON.parse(text);
        } catch (e) {
          lastErr = e;
          continue;
        }
      }
      throw lastErr || new Error("No working metadata URL");
    }

    async function findFirstWorkingImageUrl(uri) {
      const candidates = normalizeResourceCandidates(uri);
      for (const url of candidates) {
        // If data: or https: just try it as image src
        // We don't prefetch to avoid CORS; browser will load image directly
        return url;
      }
      return null;
    }

    async function getFirstTokenUriThatWorks(nftContract) {
      // Try a few common token IDs to improve preview reliability
      const tries = [1, 0, 2, 10, 100];
      for (const tid of tries) {
        try {
          const uri = await nftContract.tokenURI(tid);
          if (uri && String(uri).trim()) return uri;
        } catch {}
      }
      return null;
    }

    async function loadPreviewImage() {
      const addr = normalizeCollectionInput(el('browse-collection'));
      const imgEl = el('nft-preview');

      if (!ethers.utils.isAddress(addr)) {
        imgEl.style.display = 'none';
        imgEl.removeAttribute("src");
        return;
      }

      try {
        const nft = new ethers.Contract(
          addr,
          ERC721_ABI,
          provider || new ethers.providers.JsonRpcProvider(SONIC_RPC)
        );

        const tokenUri = await getFirstTokenUriThatWorks(nft);
        if (!tokenUri) {
          imgEl.style.display = 'none';
          imgEl.removeAttribute("src");
          return;
        }

        // Fetch metadata JSON with fallbacks (IPFS gateways + Arweave)
        const meta = await fetchFirstWorkingJson(tokenUri);

        // Find image field variants
        const imageField = meta.image || meta.image_url || meta.imageURI || meta.imageUri || meta.image_data;
        if (!imageField) {
          imgEl.style.display = 'none';
          imgEl.removeAttribute("src");
          return;
        }

        // If image itself is ipfs:// or ar://, normalize
        const imgCandidates = normalizeResourceCandidates(String(imageField));
        let finalImgUrl = null;

        // Prefer first candidate; if ipfs, candidates are gateways
        for (const c of imgCandidates) {
          finalImgUrl = c;
          break;
        }

        if (!finalImgUrl) {
          imgEl.style.display = 'none';
          imgEl.removeAttribute("src");
          return;
        }

        // Optional: handle ardrive "ar://" is already normalized above.
        // For ardrive.io URLs, we use them as-is.

        imgEl.onerror = () => {
          imgEl.style.display = "none";
        };
        imgEl.onload = () => {
          imgEl.style.display = "block";
        };

        imgEl.src = finalImgUrl;
        imgEl.style.display = 'block';
      } catch (err) {
        console.error("Preview load failed:", err);
        imgEl.style.display = 'none';
        imgEl.removeAttribute("src");
      }
    }

    /* ===== Offers by Collection: Debounced auto-load offers on input/paste ===== */
    let browseOffersTimer = null;

    function scheduleBrowseOffersLoad() {
      clearTimeout(browseOffersTimer);
      browseOffersTimer = setTimeout(async () => {
        const input = el('browse-collection');
        const val = (input.value || "").trim();

        // If empty, show ALL active offers
        if (!val) {
          await loadAllActiveOffers();
          return;
        }

        const nft = normalizeCollectionInput(input);
        const sel = el('collection-offers');
        const status = el('collection-offers-status');

        if (!ethers.utils.isAddress(nft)) {
          sel.innerHTML = '';
          status.textContent = 'Invalid collection address';
          return;
        }

        await loadCollectionOffers();
      }, 250);
    }

    async function rpcReportsCorrectChain() {
      try {
        const resp = await fetch(SONIC_RPC, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jsonrpc: '2.0', id: 1, method: 'eth_chainId', params: [] })
        });
        const data = await resp.json();
        const ok = parseInt(data.result, 16) === REQUIRED_CHAIN_ID;
        el('rpc-status').textContent = ok ? 'OK' : 'Mismatch';
        return ok;
      } catch {
        el('rpc-status').textContent = 'Error';
        return false;
      }
    }

    async function trySwitchOrAdd() {
      if (!window.ethereum) return false;
      const rpcOk = await rpcReportsCorrectChain();
      if (!rpcOk) return false;

      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: SONIC_CHAIN_ID_HEX }]
        });
        return true;
      } catch (err) {
        if (err.code === 4902) {
          try {
            await window.ethereum.request({
              method: 'wallet_addEthereumChain',
              params: SONIC_PARAMS
            });
            return true;
          } catch {
            return false;
          }
        }
        return false;
      }
    }

    async function connectWallet() {
      if (!window.ethereum) {
        alert('Please install a Web3 wallet');
        return;
      }
      try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        await handleAccountsChanged(accounts);
      } catch {
        el('wallet-status').textContent = 'Rejected';
      }
    }

    async function handleAccountsChanged(accounts) {
      if (!accounts || !accounts.length) {
        el('wallet-status').textContent = 'Disconnected';
        return;
      }

      provider = new ethers.providers.Web3Provider(window.ethereum, 'any');
      signer = provider.getSigner();
      account = await signer.getAddress();

      let net = await provider.getNetwork();
      if (net.chainId !== REQUIRED_CHAIN_ID) {
        const ok = await trySwitchOrAdd();
        if (!ok) {
          el('wallet-status').textContent = 'Wrong network';
          return;
        }
        net = await provider.getNetwork();
        if (net.chainId !== REQUIRED_CHAIN_ID) {
          el('wallet-status').textContent = 'Wrong network';
          return;
        }
      }

      escrowWrite = new ethers.Contract(ESCROW_ADDRESS, ESCROW_ABI, signer);
      escrowRead  = new ethers.Contract(ESCROW_ADDRESS, ESCROW_ABI, provider);

      // Feature detection: registry + createOffer overload
      try {
        await escrowRead.getCollectionCount();
        hasCollectionRegistry = true;
      } catch {
        hasCollectionRegistry = false;
      }

      try {
        escrowWrite.interface.getFunction("createOffer(address,uint256,uint64,string)");
        hasCreateOfferWithName = true;
      } catch {
        hasCreateOfferWithName = false;
      }

      el('wallet-button').textContent = '…' + account.slice(-4);
      el('wallet-status').textContent = 'Connected';

      await refreshUserStats();
      await loadFulfilledOffers();
      await loadMyOffers();

      // Load recorded collections only if the contract supports it
      if (hasCollectionRegistry) await loadRecordedCollections();
      else {
        const dl = el("recorded-collections");
        if (dl) dl.innerHTML = "";
      }

      // Load ALL active offers immediately on connect
      await loadAllActiveOffers();

      scheduleOfferCollectionNameLoad();
    }

    async function refreshUserStats() {
      if (!escrowRead || !account) return;
      try {
        const [total, active, fulfilled, cancelled] = await escrowRead.getUserStats(account);
        el('user-offer-stats').textContent =
          `total ${total} active ${active} filled ${fulfilled} cancelled ${cancelled}`;
      } catch {
        el('user-offer-stats').textContent = '–';
      }
    }

    async function previewFee() {
      if (!escrowRead) {
        el('offer-fee-preview').textContent = 'Connect wallet first';
        return;
      }
      const amountStr = el('offer-amount').value.trim();
      if (!amountStr || Number(amountStr) <= 0) {
        el('offer-fee-preview').textContent = 'Enter a valid amount';
        return;
      }
      try {
        const amountWei = ethers.utils.parseEther(amountStr);
        const feeWei = await escrowRead.calculateFee(amountWei);
        const totalWei = amountWei.add(feeWei);
        el('offer-fee-preview').textContent =
          `Fee: ${ethers.utils.formatEther(feeWei)} S Total to send: ${ethers.utils.formatEther(totalWei)} S`;
      } catch (e) {
        el('offer-fee-preview').textContent = e.message || 'Fee preview failed';
      }
    }

    async function createOffer() {
      if (!escrowWrite || !account) {
        el('offer-status').textContent = 'Connect wallet first';
        return;
      }

      const nft = normalizeCollectionInput(el('offer-collection'));
      const amountStr = el('offer-amount').value.trim();
      const expiryStr = el('offer-expiry').value.trim() || '0';

      if (!ethers.utils.isAddress(nft)) {
        el('offer-status').textContent = 'Invalid collection address';
        return;
      }
      if (!amountStr || Number(amountStr) <= 0) {
        el('offer-status').textContent = 'Amount must be > 0';
        return;
      }

      try {
        const amountWei = ethers.utils.parseEther(amountStr);
        const feeWei = await escrowRead.calculateFee(amountWei);
        const totalWei = amountWei.add(feeWei);

        const hours = Number(expiryStr);
        const expirySeconds = ethers.BigNumber.from(Math.max(0, Math.floor(hours * 3600)));

        // Fetch name for recording (if available)
        const name = await getCollectionName(nft);
        const recordName = (name && name !== "(unavailable)") ? name : "";

        el('offer-status').textContent = 'Sending transaction…';

        // Prefer overload; fallback to 3-arg if not supported
        let tx;
        if (hasCreateOfferWithName) {
          tx = await escrowWrite["createOffer(address,uint256,uint64,string)"](
            nft,
            amountWei,
            expirySeconds,
            recordName,
            { value: totalWei }
          );
        } else {
          tx = await escrowWrite.createOffer(
            nft,
            amountWei,
            expirySeconds,
            { value: totalWei }
          );
        }

        await tx.wait();
        el('offer-status').textContent = 'Offer created';

        // Refresh dropdown list from contract AFTER offer created (if supported)
        if (hasCollectionRegistry) await loadRecordedCollections();

        await refreshUserStats();
        await loadMyOffers();

        const browseVal = (el('browse-collection').value || "").trim();
        if (!browseVal) await loadAllActiveOffers();
        else await loadCollectionOffers();

      } catch (e) {
        el('offer-status').textContent = e.message || 'Create failed';
      }
    }

    async function loadAllActiveOffers() {
      if (!escrowRead) {
        el('collection-offers-status').textContent = 'Connect wallet first';
        return;
      }

      el('collection-offers-status').textContent = 'Loading all active offers…';
      const sel = el('collection-offers');
      sel.innerHTML = '';

      try {
        const ids = await escrowRead.getActiveOffers(ethers.constants.AddressZero);

        if (!ids.length) {
          el('collection-offers-status').textContent = 'No active offers';
          return;
        }

        const offers = [];
        for (const id of ids) {
          const offer = await escrowRead.getOffer(id);
          offers.push({ id: id.toString(), offer });
        }

        const uniq = Array.from(new Set(offers.map(x => (x.offer.nftContract || '').toLowerCase())))
          .filter(a => ethers.utils.isAddress(a));
        await Promise.all(uniq.map(a => getCollectionName(a)));

        for (const { id, offer } of offers) {
          const opt = document.createElement('option');
          opt.value = id;

          const name = await getCollectionName(offer.nftContract);
          const amount = ethers.utils.formatEther(offer.amount);
          const expiry = offer.expiry.toString() === '0'
            ? 'no expiry'
            : new Date(Number(offer.expiry) * 1000).toLocaleString();

          opt.textContent = `${name} — ${amount} S — expiry: ${expiry}`;
          sel.appendChild(opt);
        }

        el('collection-offers-status').textContent =
          `Loaded ${ids.length} active offers (all collections)`;
      } catch (e) {
        el('collection-offers-status').textContent = e.message || 'Load failed';
      }
    }

    async function loadCollectionOffers() {
      if (!escrowRead) {
        el('collection-offers-status').textContent = 'Connect wallet first';
        return;
      }

      const nft = normalizeCollectionInput(el('browse-collection'));
      if (!ethers.utils.isAddress(nft)) {
        el('collection-offers-status').textContent = 'Invalid collection address';
        return;
      }

      el('collection-offers-status').textContent = 'Loading…';
      const sel = el('collection-offers');
      sel.innerHTML = '';

      const collectionName = await getCollectionName(nft);

      try {
        const ids = await escrowRead.getActiveOffersByCollection(nft);
        if (!ids.length) {
          el('collection-offers-status').textContent = 'No active offers';
          return;
        }

        for (const id of ids) {
          const offer = await escrowRead.getOffer(id);
          const opt = document.createElement('option');
          opt.value = id.toString();

          const amount = ethers.utils.formatEther(offer.amount);
          const expiry = offer.expiry.toString() === '0'
            ? 'no expiry'
            : new Date(Number(offer.expiry) * 1000).toLocaleString();

          opt.textContent = `${collectionName} — ${amount} S — expiry: ${expiry}`;
          sel.appendChild(opt);
        }

        el('collection-offers-status').textContent = `Loaded ${ids.length} offers`;
      } catch (e) {
        el('collection-offers-status').textContent = e.message || 'Load failed';
      }
    }

    async function loadFulfilledOffers() {
      if (!escrowRead || !account) return;
      const sel = el('withdraw-offer-id');
      sel.innerHTML = '';
      try {
        const all = await escrowRead.getOffersByBuyer(account);
        for (const id of all) {
          const offer = await escrowRead.getOffer(id);
          if (offer.status === 3) {
            const opt = document.createElement('option');
            opt.value = id.toString();
            opt.textContent = `Offer #${id} — NFT ready to withdraw`;
            sel.appendChild(opt);
          }
        }
        if (!sel.children.length) {
          const opt = document.createElement('option');
          opt.disabled = true;
          opt.textContent = "No fulfilled offers";
          sel.appendChild(opt);
        }
      } catch (e) {
        console.error("loadFulfilledOffers error:", e);
      }
    }

    async function fulfilOffer() {
      if (!escrowWrite || !account) {
        el('collection-offers-status').textContent = 'Connect wallet first';
        return;
      }
      const sel = el('collection-offers');
      const offerId = sel.value;
      const tokenIdStr = el('fulfil-token-id').value.trim();

      if (!offerId) {
        el('collection-offers-status').textContent = 'Select an offer';
        return;
      }
      if (!tokenIdStr) {
        el('collection-offers-status').textContent = 'Enter tokenId';
        return;
      }

      try {
        const offer = await escrowRead.getOffer(offerId);
        const nftAddress = offer.nftContract;

        const nft = new ethers.Contract(nftAddress, ERC721_ABI, signer);
        const approved = await nft.getApproved(tokenIdStr);
        const isAll = await nft.isApprovedForAll(account, ESCROW_ADDRESS);

        if (approved !== ESCROW_ADDRESS && !isAll) {
          el('collection-offers-status').textContent = 'Requesting approval…';
          const txA = await nft.approve(ESCROW_ADDRESS, tokenIdStr);
          await txA.wait();
        }

        el('collection-offers-status').textContent = 'Sending fulfil transaction…';
        const tx = await escrowWrite.fulfilOffer(offerId, tokenIdStr);
        await tx.wait();

        el('collection-offers-status').textContent = 'Offer fulfilled';
        await refreshUserStats();

        const browseVal = (el('browse-collection').value || "").trim();
        if (!browseVal) await loadAllActiveOffers();
        else await loadCollectionOffers();

        await loadFulfilledOffers();
      } catch (e) {
        el('collection-offers-status').textContent = e.message || 'Fulfil failed';
      }
    }

    async function loadMyOffers() {
      if (!escrowRead || !account) {
        el('my-offers-status').textContent = 'Connect wallet first';
        return;
      }

      el('my-offers-status').textContent = 'Loading…';
      const sel = el('my-offers');
      sel.innerHTML = '';

      try {
        const ids = await escrowRead.getActiveOffersByBuyer(account);
        if (!ids.length) {
          el('my-offers-status').textContent = 'No active offers';
          return;
        }

        const offers = [];
        for (const id of ids) {
          const offer = await escrowRead.getOffer(id);
          offers.push({ id: id.toString(), offer });
        }

        const uniqueCollections = Array.from(new Set(offers.map(x => (x.offer.nftContract || '').toLowerCase())))
          .filter(a => ethers.utils.isAddress(a));
        await Promise.all(uniqueCollections.map(a => getCollectionName(a)));

        for (const { id, offer } of offers) {
          const opt = document.createElement('option');
          opt.value = id;

          const amount = ethers.utils.formatEther(offer.amount);

          let expiry;
          if (offer.expiry.toString() === '0') {
            expiry = 'no expiry';
          } else {
            const ts = Number(offer.expiry) * 1000;
            const expired = Date.now() > ts;
            expiry = expired
              ? `expired (${new Date(ts).toLocaleString()})`
              : new Date(ts).toLocaleString();
          }

          const name = await getCollectionName(offer.nftContract);
          opt.textContent = `${name} — ${amount} S — ${expiry}`;
          sel.appendChild(opt);
        }

        el('my-offers-status').textContent = `Loaded ${ids.length} offers`;
      } catch (e) {
        el('my-offers-status').textContent = e.message || 'Load failed';
      }
    }

    async function cancelOffer() {
      if (!escrowWrite || !account) {
        el('my-offers-status').textContent = 'Connect wallet first';
        return;
      }
      const sel = el('my-offers');
      const offerId = sel.value;
      if (!offerId) {
        el('my-offers-status').textContent = 'Select an offer';
        return;
      }
      try {
        el('my-offers-status').textContent = 'Cancelling…';
        const tx = await escrowWrite.cancelOffer(offerId);
        await tx.wait();
        el('my-offers-status').textContent = 'Offer cancelled';

        await refreshUserStats();
        await loadMyOffers();
        await loadFulfilledOffers();

        const browseVal = (el('browse-collection').value || "").trim();
        if (!browseVal) await loadAllActiveOffers();
        else await loadCollectionOffers();

      } catch (e) {
        el('my-offers-status').textContent = e.message || 'Cancel failed';
      }
    }

    async function withdrawNFT() {
      if (!escrowWrite || !account) {
        el('my-offers-status').textContent = 'Connect wallet first';
        return;
      }
      const sel = el('withdraw-offer-id');
      const offerId = sel.value;
      if (!offerId) {
        el('my-offers-status').textContent = 'Select a fulfilled offer';
        return;
      }
      try {
        el('my-offers-status').textContent = 'Withdrawing NFT…';
        const tx = await escrowWrite.withdrawNFT(offerId);
        await tx.wait();
        el('my-offers-status').textContent = 'NFT withdrawn';

        await refreshUserStats();
        await loadFulfilledOffers();
        await loadMyOffers();
      } catch (e) {
        el('my-offers-status').textContent = e.message || 'Withdraw failed';
      }
    }

    // Bind UI
    el('wallet-button').onclick = connectWallet;
    el('btn-preview-fee').onclick = previewFee;
    el('btn-create-offer').onclick = createOffer;
    el('btn-fulfil-offer').onclick = fulfilOffer;
    el('btn-cancel-offer').onclick = cancelOffer;
    el('btn-withdraw-nft').onclick = withdrawNFT;

    // Offers by Collection: auto preview + auto load offers
    el('browse-collection').addEventListener('input', () => {
      loadPreviewImage();
      scheduleBrowseOffersLoad();
    });
    el('browse-collection').addEventListener('change', () => {
      loadPreviewImage();
      scheduleBrowseOffersLoad();
    });

    // Create Offer: name lookup
    el('offer-collection').addEventListener('input', scheduleOfferCollectionNameLoad);
    el('offer-collection').addEventListener('change', scheduleOfferCollectionNameLoad);

    window.addEventListener('load', async () => {
      await rpcReportsCorrectChain();
      el('rolling-stats').classList.add('running');
      el('collection-offers-status').textContent = 'Connect wallet to load offers';
    });
  </script>
</body>
</html>
